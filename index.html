<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 24px;
            display: flex;
            gap: 25px;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 120px;
        }
        input[type=range] {
            cursor: pointer;
            accent-color: #10b981;
        }
        .label-val {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-item">
            <div class="label-val">
                <span>Depth</span>
                <span id="depth-val">13</span>
            </div>
            <input type="range" id="depth" min="1" max="15" value="13">
        </div>
        <div class="control-item">
            <div class="label-val">
                <span>Spread</span>
                <span id="angle-val">0.3</span>
            </div>
            <input type="range" id="angle" min="0.1" max="1.5" value="0.3" step="0.01">
        </div>
        <div class="control-item">
            <div class="label-val">
                <span>Wind</span>
                <span id="wind-val">3.0</span>
            </div>
            <input type="range" id="wind" min="0" max="5" value="3" step="0.1">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const depthSlider = document.getElementById('depth');
        const angleSlider = document.getElementById('angle');
        const windSlider = document.getElementById('wind');
        
        const depthDisp = document.getElementById('depth-val');
        const angleDisp = document.getElementById('angle-val');
        const windDisp = document.getElementById('wind-val');

        let width, height;
        let time = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resize);
        resize();

        function drawTree(x, y, len, angle, branchWidth, depth) {
            ctx.beginPath();
            ctx.save();
            
            // Branch styling logic
            const color = depth < 3 ? 
                `rgb(${100 + depth * 20}, ${200 - depth * 10}, ${150})` : 
                `rgb(${140 - depth * 5}, ${100 - depth * 5}, ${80 - depth * 5})`;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = branchWidth;
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (depth === 0) {
                ctx.restore();
                return;
            }

            const windFactor = parseFloat(windSlider.value);
            const sway = Math.sin(time + depth) * (windFactor * 0.05);
            const spread = parseFloat(angleSlider.value);

            drawTree(0, -len, len * 0.75, spread + sway, branchWidth * 0.7, depth - 1);
            drawTree(0, -len, len * 0.75, -spread + sway, branchWidth * 0.7, depth - 1);

            ctx.restore();
        }

        function animate() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            // Ground glow effect
            const groundGlow = ctx.createRadialGradient(width/2, height, 0, width/2, height, height*0.4);
            groundGlow.addColorStop(0, 'rgba(16, 185, 129, 0.1)');
            groundGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = groundGlow;
            ctx.fillRect(0, 0, width, height);

            time += 0.02;

            depthDisp.innerText = depthSlider.value;
            angleDisp.innerText = angleSlider.value;
            windDisp.innerText = windSlider.value;

            const rootLen = height * 0.22;
            const rootWidth = parseInt(depthSlider.value) * 1.5;
            
            drawTree(width / 2, height * 0.9, rootLen, 0, rootWidth, parseInt(depthSlider.value));

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
